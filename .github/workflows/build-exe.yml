name: Build Windows .exe

on:
  push:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 4. Build the .exe ──────────────────────────────────────
      - name: Build Windows .exe with PyInstaller
        run: python build.py

      # ── 5. Upload .exe as artifact ─────────────────────────────
      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigitalTwin-Windows-exe
          path: dist/DigitalTwin/
          retention-days: 30

      # ── 6. Create GitHub Release (on push to main) ─────────────
      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create Release and upload .exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: "Digital Twin Build ${{ steps.sha.outputs.short }}"
          body: |
            ## Digital Twin — Zirconia Oxygen Sensor (OBOGS)

            ### How to run
            1. Download `DigitalTwin-Windows.zip` below
            2. Extract it
            3. Double-click `DigitalTwin.exe`
            4. Browser opens automatically at `http://127.0.0.1:8000`

            No Python installation required.
          files: dist/DigitalTwin/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
